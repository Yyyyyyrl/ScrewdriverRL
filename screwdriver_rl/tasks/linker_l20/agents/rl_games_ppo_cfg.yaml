params:
  seed: 42

  env:
    clip_observations: 5.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  # HORA-faithful deployable actor: the policy obs is [proprio(32),
  # privileged(19)]; the custom network (screwdriver_rl/algos/latent_network.py)
  # encodes the privileged tail into a latent_dim-D bottleneck and feeds
  # [proprio, latent] to the MLP below.  The Stage-2 adapter reproduces that
  # latent proprioceptively, so the trained policy deploys directly.
  network:
    name: priv_latent_actor_critic
    separate: False
    proprio_dim: 32
    latent_dim: 8
    priv_mlp_units: [256, 128]
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [1024, 512, 256, 128]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  # Stage 1 asymmetric critic.
  # Activated when the environment's state_space > 0 (i.e. --stage 1).
  # The critic sees the 19-D privileged observation (exact screwdriver pose,
  # velocity, friction, fingertip distances) while the actor only sees the
  # 35-D policy observation.  rl_games reads both dims from the env spaces, so
  # the network below adapts automatically.
  central_value_config:
    minibatch_size: 8192
    mini_epochs: 4
    learning_rate: 1e-4
    lr_schedule: adaptive
    # Stability: tightened 0.016 -> 0.008 (see config block below) to match the
    # actor KL band and stop the adaptive LR from ratcheting up during easy
    # convergence.
    kl_threshold: 0.008
    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    network:
      name: actor_critic
      central_value: True
      mlp:
        units: [512, 256, 128]
        activation: elu
        initializer:
          name: default
        regularizer:
          name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: linker_l20_screwdriver_rotation
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    num_actors: -1
    reward_shaper:
      scale_value: 0.005
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    # --- PPO stability (anti-collapse) ---
    # The 21-06 Phase-2 run mastered the task (~15.7k reward, full episodes) then
    # collapsed at iter ~290: the adaptive scheduler let LR ratchet to 5.85e-4
    # during easy convergence, and a single 8-mini-epoch iteration overshot to
    # KL 0.3 -> 0.92, destroying the policy. Fixes: lower base LR (3e-4 -> 1e-4),
    # tighter KL band (0.016 -> 0.008) so the scheduler cuts harder / raises less,
    # and half the per-iteration drift (mini_epochs 8 -> 4).
    learning_rate: 1e-4
    lr_schedule: adaptive
    schedule_type: standard
    kl_threshold: 0.008
    score_to_win: 100000
    max_epochs: 8000
    save_best_after: 100
    save_frequency: 200
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 32
    minibatch_size: 8192
    mini_epochs: 4
    critic_coef: 4
    clip_value: True
    seq_length: 4
    bounds_loss_coef: 0.0001

    player:
      deterministic: True
      games_num: 100000
      print_stats: True
